services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bist-rag-api
    env_file:
      - .env
    ports:
      - "${API_HOST_PORT:-18000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: bist-rag-worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["python", "-m", "worker.main"]
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7.2
    container_name: bist-rag-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: bist-rag-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: >
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2024-06-22T05-26-45Z
    container_name: bist-rag-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 20s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.13
    container_name: bist-rag-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./data/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 20s
      timeout: 10s
      retries: 8

  langfuse:
    image: ghcr.io/langfuse/langfuse:2
    container_name: bist-rag-langfuse
    profiles: ["observability"]
    ports:
      - "3000:3000"
