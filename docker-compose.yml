services:
  web:
    image: node:22-alpine
    container_name: bist-rag-web
    working_dir: /workspace/frontend
    volumes:
      - ./:/workspace
    environment:
      NEXT_PUBLIC_API_BASE: http://api:8000
    command: sh -c "npm install && npm run dev -- -p 3311"
    ports:
      - "3311:3311"
    depends_on:
      api:
        condition: service_healthy
    profiles: ["web"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bist-rag-api
    env_file:
      - .env
    environment:
      WEAVIATE_URL: http://weaviate:8080
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_HOST_PORT:-18000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: bist-rag-worker
    env_file:
      - .env
    environment:
      WEAVIATE_URL: http://weaviate:8080
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started
      api:
        condition: service_healthy
    command: ["python", "-m", "worker.main"]
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7.2
    container_name: bist-rag-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  weaviate:
    image: semitechnologies/weaviate:1.27.6
    container_name: bist-rag-weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 20
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - ./data/weaviate:/var/lib/weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 20s
      timeout: 10s
      retries: 8

  langfuse:
    image: ghcr.io/langfuse/langfuse:2
    container_name: bist-rag-langfuse
    profiles: ["observability"]
    ports:
      - "3305:3000"
